id: plan-steps
name: Step-by-step plan synthesis
category: planning
notes: >
  Two SLMs surface domain-specific tips; frontier produces the actual
  ordered plan that uses them.
max_tokens: 700
temperature: 0.3

solo_prompt: |
  Write a numbered, step-by-step plan (8-10 steps) for a beginner to
  set up a small home vegetable garden from scratch in early spring.
  Each step should be one to two sentences and actionable.

mixture_plan:
  plan_id: plan-steps
  description: Gather soil + planting tips, then frontier writes plan
  nodes:
    - id: soil_tips
      depends_on: []
      prompt: |
        List 5 short tips for preparing soil in a beginner home vegetable
        garden (drainage, amendments, pH). One sentence each.
    - id: plant_tips
      depends_on: []
      prompt: |
        List 5 short tips for choosing and planting vegetables for a
        beginner home vegetable garden in early spring (cool-season
        crops, spacing, watering). One sentence each.

mixture_composer_prompt: |
  Write a numbered, step-by-step plan (8-10 steps) for a beginner to
  set up a small home vegetable garden from scratch in early spring.
  Each step should be one to two sentences and actionable. Incorporate
  the soil and planting tips below where appropriate (you do not have to
  use all of them).

  SOIL TIPS: {leaf:soil_tips}
  PLANTING TIPS: {leaf:plant_tips}
