id: extract-entities
name: Entity extraction from short bios
category: extraction
notes: >
  Three short bios, extract (name, role, organization, location) per bio
  in parallel, frontier consolidates into a JSON array.
max_tokens: 500
temperature: 0.0

solo_prompt: |
  Extract entities from the three short bios below. Return a JSON array of
  objects with keys: name, role, organization, location. Use null for
  fields not stated.

  BIO 1: Dr. Lena Patel leads the immunotherapy research group at Stanford
  Medical Center in Palo Alto.

  BIO 2: Marcus Greene is a principal engineer at NovaSky Robotics. He
  works out of their Berlin office.

  BIO 3: Aiko Yamada recently joined a small startup as head of product;
  her LinkedIn lists no location.

mixture_plan:
  plan_id: extract-entities
  description: Extract entities from each bio in parallel
  nodes:
    - id: b1
      depends_on: []
      prompt: |
        Extract entities from this bio as a JSON object with keys
        name, role, organization, location (use null if absent). Return
        the JSON object only, nothing else.

        Bio: Dr. Lena Patel leads the immunotherapy research group at
        Stanford Medical Center in Palo Alto.
    - id: b2
      depends_on: []
      prompt: |
        Extract entities from this bio as a JSON object with keys
        name, role, organization, location (use null if absent). Return
        the JSON object only, nothing else.

        Bio: Marcus Greene is a principal engineer at NovaSky Robotics.
        He works out of their Berlin office.
    - id: b3
      depends_on: []
      prompt: |
        Extract entities from this bio as a JSON object with keys
        name, role, organization, location (use null if absent). Return
        the JSON object only, nothing else.

        Bio: Aiko Yamada recently joined a small startup as head of product;
        her LinkedIn lists no location.

mixture_composer_prompt: |
  Combine these three extracted JSON objects into a single JSON array, in
  order. Validate that each object has exactly the keys name, role,
  organization, location (using null for unknown). Return the array only.

  OBJ 1: {leaf:b1}
  OBJ 2: {leaf:b2}
  OBJ 3: {leaf:b3}
