id: math-multistep
name: Multi-step word problem
category: math
notes: >
  Reasoning-heavy single-shot task — should favor frontier-solo. Mixture
  uses SLMs to extract numerical facts; the frontier does the actual
  arithmetic + reasoning.
max_tokens: 600
temperature: 0.0

solo_prompt: |
  A bookstore buys novels for $7.50 each and sells them for $14. They
  paid a fixed $1,200 shipping fee on a single shipment of 400 novels.
  By end of month they had sold 312 novels and returned 18 damaged ones
  to the supplier (full refund). What is the bookstore's net profit on
  this shipment so far? Show your steps briefly, then give the final
  number on its own line.

mixture_plan:
  plan_id: math-multistep
  description: Extract facts in parallel, then frontier reasons
  nodes:
    - id: facts
      depends_on: []
      prompt: |
        Extract a JSON object with the numerical facts in this word
        problem. Use keys: cost_per_novel, sell_per_novel, shipping_fee,
        shipment_size, sold, returned. Return JSON only.

        Word problem: A bookstore buys novels for $7.50 each and sells
        them for $14. They paid a fixed $1,200 shipping fee on a single
        shipment of 400 novels. By end of month they had sold 312 novels
        and returned 18 damaged ones to the supplier (full refund).
    - id: terms
      depends_on: []
      prompt: |
        In one sentence each, define these terms for a small-business
        accounting context: cost of goods sold, gross revenue, net profit.

mixture_composer_prompt: |
  Solve this multi-step word problem using the extracted facts and the
  brief definitions below. Show your steps briefly, then give the final
  number on its own line.

  Word problem: A bookstore buys novels for $7.50 each and sells them
  for $14. They paid a fixed $1,200 shipping fee on a single shipment of
  400 novels. By end of month they had sold 312 novels and returned 18
  damaged ones to the supplier (full refund). What is the bookstore's
  net profit on this shipment so far?

  EXTRACTED FACTS: {leaf:facts}
  DEFINITIONS: {leaf:terms}
