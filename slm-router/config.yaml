# Persistent state (feedback log, metrics log, heads, embedding cache,
# train state, dashboard) lives here. Override with SLOWANDSWEET_HOME env
# var. Paths under `paths:` resolve relative to this directory.
data_dir: ~/.slowandsweet

encoder:
  model: sentence-transformers/all-MiniLM-L6-v2
  max_tokens: 512

policy:
  quality_floor: 0.7
  cost_floor_pct: 20.0
  confidence_floor: 0.5
  epsilon: 0.10

# M0 leaf routing: pick which local SLM should execute each plan leaf.
# available_slms must match names the queue dispatcher actually has
# workers for (defined in slm-deploy/slms.yaml). Names not in this list
# get filtered out at inference time.
leaf:
  available_slms:
    - smollm2:1.7b
    - gemma2:2b
    - llama3.2:3b
    - qwen2.5:3b

train:
  min_records: 40
  min_quality_labels: 20
  min_new_records_since_last_train: 10
  holdout_fraction: 0.2
  k_folds: 5
  seed: 7

# Leaf-router retraining (M1). Runs alongside the arm-router train on the
# same schedule; independent gate + state file so promotions don't interfere.
leaf_train:
  min_records: 20
  min_records_per_slm: 3
  min_new_records_since_last_train: 10
  holdout_fraction: 0.2
  k_folds: 5
  seed: 7
  ridge_alpha: 1.0

paths:
  heads_dir: heads
  head_pointer: heads/HEAD
  feedback_log: feedback.jsonl
  metrics_log: metrics.jsonl
  train_state: train_state.json
  dashboard_html: dashboard.html
  emb_cache: .emb_cache.npz
  leaf_heads_dir: leaf_heads
  leaf_head_pointer: leaf_heads/HEAD
  leaf_feedback_log: leaf_feedback.jsonl
  leaf_train_state: leaf_train_state.json
  leaf_emb_cache: .leaf_emb_cache.npz

server:
  host: 127.0.0.1
  port: 8092
